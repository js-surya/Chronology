<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep space gradient -->
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
    
    <!-- Nova explosion gradient -->
    <radialGradient id="novaExplosion" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="30%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="70%" style="stop-color:#666666;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Strong glow -->
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background - Deep space -->
  <rect width="1024" height="1024" rx="226" ry="226" fill="url(#spaceGradient)"/>
  
  <!-- Starfield -->
  <circle cx="180" cy="220" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="850" cy="280" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="220" cy="780" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="880" cy="720" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="140" cy="550" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="920" cy="450" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="300" cy="180" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="750" cy="880" r="1" fill="#ffffff" opacity="0.7"/>
  
  <!-- Orbital rings (spacetime fabric) -->
  <g fill="none" stroke="#ffffff" opacity="0.2">
    <circle cx="512" cy="512" r="400" stroke-width="1"/>
    <circle cx="512" cy="512" r="340" stroke-width="1.5"/>
    <circle cx="512" cy="512" r="280" stroke-width="1"/>
  </g>
  
  <!-- Time warp distortion (curved spacetime) -->
  <g fill="none" stroke="#ffffff" stroke-width="2" opacity="0.25">
    <path d="M 312 512 Q 412 412, 512 412 T 712 512" />
    <path d="M 712 512 Q 612 612, 512 612 T 312 512" />
  </g>
  
  <!-- Minimalist clock markers -->
  <g stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
    <line x1="512" y1="192" x2="512" y2="222"/>
    <line x1="732" y1="292" x2="712" y2="312"/>
    <line x1="832" y1="512" x2="802" y2="512"/>
    <line x1="732" y1="732" x2="712" y2="712"/>
    <line x1="512" y1="832" x2="512" y2="802"/>
    <line x1="292" y1="732" x2="312" y2="712"/>
    <line x1="192" y1="512" x2="222" y2="512"/>
    <line x1="292" y1="292" x2="312" y2="312"/>
  </g>
  
  <!-- Nova explosion (irregular particles, not symmetrical) -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="512" cy="282" r="4"/>
    <circle cx="642" cy="332" r="3"/>
    <circle cx="722" cy="462" r="3.5"/>
    <circle cx="742" cy="612" r="3"/>
    <circle cx="642" cy="722" r="4"/>
    <circle cx="462" cy="742" r="3"/>
    <circle cx="332" cy="672" r="3.5"/>
    <circle cx="282" cy="512" r="4"/>
    <circle cx="312" cy="372" r="3"/>
    <circle cx="442" cy="302" r="3.5"/>
    
    <!-- Secondary particles -->
    <circle cx="582" cy="352" r="2" opacity="0.5"/>
    <circle cx="682" cy="532" r="2" opacity="0.5"/>
    <circle cx="582" cy="682" r="2" opacity="0.5"/>
    <circle cx="382" cy="662" r="2" opacity="0.5"/>
    <circle cx="332" cy="482" r="2" opacity="0.5"/>
    <circle cx="412" cy="362" r="2" opacity="0.5"/>
  </g>
  
  <!-- Nova glow expanding outward -->
  <circle cx="512" cy="512" r="200" fill="url(#novaExplosion)" opacity="0.3" filter="url(#strongGlow)"/>
  
  <!-- Clock hands (elegant and simple) -->
  <g filter="url(#glow)">
    <!-- Hour hand -->
    <line x1="512" y1="512" x2="512" y2="382" 
          stroke="#ffffff" stroke-width="8" 
          stroke-linecap="round"
          transform="rotate(135 512 512)"/>
    
    <!-- Minute hand -->
    <line x1="512" y1="512" x2="512" y2="312" 
          stroke="#ffffff" stroke-width="5" 
          stroke-linecap="round"
          transform="rotate(45 512 512)"/>
  </g>
  
  <!-- Central supernova core -->
  <circle cx="512" cy="512" r="80" fill="#ffffff" opacity="0.15" filter="url(#strongGlow)"/>
  <circle cx="512" cy="512" r="45" fill="#ffffff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="512" cy="512" r="32" fill="#ffffff"/>
  
  <!-- Core highlight -->
  <circle cx="506" cy="502" r="12" fill="#ffffff" opacity="0.6"/>
  
  <!-- Time ripples emanating from center -->
  <g fill="none" stroke="#ffffff" opacity="0.1" stroke-width="1.5">
    <circle cx="512" cy="512" r="120"/>
    <circle cx="512" cy="512" r="160"/>
  </g>
</svg>